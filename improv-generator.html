<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Improv Generator — Drama Club</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --paper: #f5f0e8;
    --cream: #ede7d8;
    --gold: #b8932a;
    --gold-light: #d4aa45;
    --muted: #7a6f60;
    --card-bg: #faf7f2;
    --border: #d4c9b4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .header-rule {
    border: none;
    border-top: 1px solid var(--gold);
    margin-bottom: 0.75rem;
  }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--paper);
    line-height: 1.05;
    margin-bottom: 0.3rem;
  }
  .header h1 em {
    font-style: italic;
    color: var(--gold-light);
  }
  .header-sub {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    margin-top: 0.3rem;
  }
  .header-rule-bottom {
    border: none;
    border-top: 1px solid var(--gold);
    margin-top: 0.75rem;
  }

  /* ── Controls ── */
  .controls {
    display: grid;
    gap: 1.5rem;
    margin-bottom: 1.75rem;
  }

  .control-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 0.6rem;
  }

  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .chip {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid #4a4030;
    background: transparent;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .chip:hover { border-color: var(--gold); color: var(--gold); }
  .chip.active { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight: 700; }

  .genre-chip {
    padding: 7px 16px;
    border-radius: 22px;
    border: 1px solid #4a4030;
    background: transparent;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .genre-chip:hover { border-color: var(--gold); color: var(--gold); }
  .genre-chip.active { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight: 700; }

  /* ── Generate Button ── */
  .gen-btn {
    width: 100%;
    padding: 15px;
    border: 1px solid var(--gold);
    background: transparent;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--gold);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.25s;
    border-radius: 2px;
    margin-bottom: 2rem;
  }
  .gen-btn:hover { background: var(--gold); color: var(--ink); }
  .gen-btn:active { transform: scale(0.99); }

  /* ── Scene Output ── */
  .output { animation: fadeUp 0.4s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .scene-card {
    border: 1px solid #4a4030;
    border-top: 3px solid var(--gold);
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    background: rgba(255,255,255,0.03);
  }
  .scene-tag {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .scene-premise {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--paper);
    line-height: 1.4;
  }

  .scene-meta {
    margin-top: 0.75rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .meta-pill {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }
  .meta-pill span {
    color: var(--paper);
    font-weight: 400;
    letter-spacing: 0;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
  }

  /* ── Player Cards ── */
  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 12px;
  }

  .player-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem;
    color: var(--ink);
  }
  .player-number {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .player-role {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 0.75rem;
  }
  .quirk-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 5px;
  }
  .reveal-btn {
    width: 100%;
    text-align: left;
    padding: 6px 10px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 3px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    transition: all 0.15s;
  }
  .reveal-btn:hover { border-color: var(--gold); color: var(--gold); }
  .reveal-btn-open {
    border-style: solid;
    border-color: var(--gold);
    color: #3a2e1a;
    background: #f0e8d2;
    font-style: italic;
    border-left: 3px solid var(--gold);
  }
  .quirk-revealed {
    font-size: 13px;
    font-style: italic;
    color: #3a2e1a;
    background: #f0e8d2;
    border-radius: 3px;
    padding: 6px 10px;
    line-height: 1.4;
    border-left: 3px solid var(--gold);
  }

  .divider {
    border: none;
    border-top: 1px solid #3a3028;
    margin: 2rem 0;
  }

  .again-btn {
    display: block;
    width: 100%;
    padding: 11px;
    border: 1px solid #4a4030;
    background: transparent;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    margin-top: 1.25rem;
  }
  .again-btn:hover { border-color: var(--gold); color: var(--gold); }

  .footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #4a4030;
  }
</style>
</head>

  <div id="output"></div>

  <div class="footer">Drama Club &mdash; Improv Scene Generator</div>
</div>

// ─────────────────────────────────────────────
//  CONTROLS SETUP
// ─────────────────────────────────────────────
let selectedPlayers = 2;
let selectedGenre = 'Comedy';
const genres = Object.keys(data);

const pc = document.getElementById('playerChips');
for (let i = 2; i <= 6; i++) {
  const b = document.createElement('button');
  b.className = 'chip' + (i === 2 ? ' active' : '');
  b.textContent = i;
  b.onclick = () => {
    selectedPlayers = i;
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  };
  pc.appendChild(b);
}

const gc = document.getElementById('genreChips');
genres.forEach((g, i) => {
  const b = document.createElement('button');
  b.className = 'genre-chip' + (i === 0 ? ' active' : '');
  b.textContent = g;
  b.onclick = () => {
    selectedGenre = g;
    document.querySelectorAll('.genre-chip').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  };
  gc.appendChild(b);
});

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function revealQuirk(btn) {
  const quirk = btn.getAttribute('data-quirk');
  const isOpen = btn.getAttribute('data-open') === 'true';
  if (isOpen) {
    btn.textContent = 'Tap to reveal →';
    btn.setAttribute('data-open', 'false');
    btn.classList.remove('reveal-btn-open');
  } else {
    btn.textContent = quirk + ' — tap to hide';
    btn.setAttribute('data-open', 'true');
    btn.classList.add('reveal-btn-open');
  }
}

// ─────────────────────────────────────────────
//  GENERATE
// ─────────────────────────────────────────────
function generate() {
  const pool = data[selectedGenre];

  // Pick a random scene
  const scene = pick(pool.scenes);

  // Take the first N roles from this scene's cast
  const roles = scene.cast.slice(0, selectedPlayers);

  // Pick N unique quirks from the genre's quirk pool
  const quirks = shuffle(pool.quirks).slice(0, selectedPlayers);

  let html = `<div class="output">
    <div class="scene-card">
      <div class="scene-tag">✦ Your scene</div>
      <div class="scene-premise">${scene.premise}</div>
      <div class="scene-meta">
        <div class="meta-pill">Genre <span>${selectedGenre}</span></div>
        <div class="meta-pill">Players <span>${selectedPlayers}</span></div>
      </div>
    </div>
    <div class="players-grid">`;

  for (let i = 0; i < selectedPlayers; i++) {
    html += `<div class="player-card">
      <div class="player-number">Player ${i + 1}</div>
      <div class="player-role">${roles[i]}</div>
      <div class="quirk-label">Secret quirk</div>
      <button class="reveal-btn" data-quirk="${quirks[i].replace(/"/g, '&quot;')}" onclick="revealQuirk(this)">Tap to reveal →</button>
    </div>`;
  }

  html += `</div>
    <button class="again-btn" onclick="generate()">✦ Generate another scene ✦</button>
  </div>`;

  document.getElementById('output').innerHTML = html;
}
</script>
